  ips:
    - ip: 20.43.122.12
      city: Amsterdam
      state: North Holland
      country: NL
      isp: Microsoft Corporation
      category: Cloud provider
      latitude: "52.379189"
      longitude: "4.899431"
    - ip: 73.62.18.101
      city: Seattle
      state: Washington
      country: US
      isp: Comcast Cable

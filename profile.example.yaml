# profile.example.yaml
#
# Example profile for `xdrgen generate`. Copy this file to (e.g.) `profile.yaml`
# and edit the lists / values to match your scenario:
#
#     uv run xdrgen generate profile.yaml -n 100
#
# Two top-level keys are recognised; both are optional:
#
#   tables:    the Defender XDR tables to emit telemetry for. Every entry
#              must have a registered generator — see `xdrgen generate
#              --help` or run with an unknown name to get the full list.
#              Omit (or set to an empty list) to generate for every table
#              that has a generator.
#
#   overrides: per-tenant fixtures that replace the defaults baked into the
#              `World`. Keys you omit keep their defaults. List-typed
#              overrides fully *replace* the default list — there is no
#              merge behaviour. Unknown keys fail fast.

tables:
  # Cloud apps & sign-ins
  - CloudAppEvents
  - EntraIdSignInEvents
  - EntraIdSpnSignInEvents
  - GraphApiAuditEvents

  # Defender for Identity (on-prem AD)
  - IdentityAccountInfo
  - IdentityDirectoryEvents
  - IdentityEvents
  - IdentityLogonEvents
  - IdentityQueryEvents

  # Defender for Endpoint (managed endpoints / MDE)
  - DeviceEvents
  - DeviceFileCertificateInfo
  - DeviceImageLoadEvents
  - DeviceLogonEvents
  - DeviceNetworkEvents
  - DeviceNetworkInfo
  - DeviceProcessEvents
  - DeviceRegistryEvents

  # Email + Safe Links (correlated by NetworkMessageId)
  - EmailEvents
  - EmailAttachmentInfo
  - EmailPostDeliveryEvents
  - EmailUrlInfo
  - UrlClickEvents

overrides:
  # Log Analytics workspace / Microsoft Entra tenant GUID. Surfaces in the
  # `TenantId` column of every event and in `OrganizationId` inside
  # CloudAppEvents.RawEventData.
  #   default: a1b2c3d4-5e6f-4071-8293-94a5b6c7d8e9
  tenant_id: 99999999-aaaa-bbbb-cccc-dddddddddddd

  # Cloud / UPN domain. Used as the host part of Message-Ids for intra-org
  # mail and a few other places.
  #   default: contoso.com
  tenant_domain: northwind.com

  # On-prem Active Directory DNS domain. Drives `AccountDomain` on
  # IdentityLogonEvents / IdentityQueryEvents / IdentityDirectoryEvents,
  # and the `Active Directory` provider entry in IdentityAccountInfo.
  #   default: contoso.local
  on_prem_ad_domain: northwind.local

  # NetBIOS form of the on-prem AD domain. Match the DNS form above —
  # mismatched NetBIOS / DNS values are a tell-tale sign of a fake row.
  #   default: CONTOSO
  on_prem_netbios_domain: NORTHWIND

  # SID prefix used to build per-user `AccountSid` values. Keep the
  # `S-1-5-21-<authority1>-<authority2>-<authority3>` shape — per-user RIDs
  # (e.g. `500` for the admin, `1104` for a regular user) are appended.
  #   default: S-1-5-21-1004336348-1177238915-682003330
  on_prem_sid_prefix: S-1-5-21-2547839481-3829164725-2581094736

  # Domain controllers — every Defender for Identity event terminates at one.
  # Required fields per entry: name, ip, device_id.
  domain_controllers:
    - name: DC01.northwind.local
      ip: 10.10.0.10
      device_id: aaaa1111-2222-3333-4444-555555555555
    - name: DC02.northwind.local
      ip: 10.10.0.11
      device_id: bbbb2222-3333-4444-5555-666666666666

  # Managed endpoints reported on by Microsoft Defender for Endpoint.
  # Drives every `Device*` table — DeviceEvents, DeviceProcessEvents,
  # DeviceLogonEvents, DeviceNetworkEvents, DeviceImageLoadEvents,
  # DeviceRegistryEvents, DeviceFileCertificateInfo, DeviceNetworkInfo.
  # Required: device_id, device_name. Everything else is optional.
  #
  # `primary_user_upn` should match a `users[].upn` so the InitiatingProcess
  # account on this device's events biases toward that user (~75% of the
  # time). Omit it for shared / unattended endpoints (file servers, build
  # boxes) so any user can show up.
  devices:
    - device_id: 7c2bd31c-2102-4ce7-93a0-2cf5e19b5a7d
      device_name: WIN-AVERY-01.northwind.com
      os_platform: Windows10
      os_version: 10.0.19045.4291
      public_ip: 20.43.122.12
      local_ip: 10.10.20.41
      mac_address: 00-15-5D-04-12-7A
      machine_group: Engineering Workstations
      primary_user_upn: avery.chen@northwind.com
    - device_id: 9e4df53e-4324-4e09-b5c2-4e17f3bd7c9f
      device_name: WIN-SAM-PAW.northwind.com
      os_platform: Windows11
      os_version: 10.0.22631.3737
      public_ip: 73.62.18.101
      local_ip: 10.10.30.5
      mac_address: 00-15-5D-04-12-7B
      machine_group: Tier-0 Privileged Access Workstations
      primary_user_upn: sam.rivera@northwind.com
    - device_id: be45cd61-1023-4ed0-9b1c-2e13ac55ff21
      device_name: WIN-FILE-01.northwind.com
      os_platform: WindowsServer2022
      os_version: 10.0.20348.2402
      public_ip: 20.43.122.12
      local_ip: 10.10.50.10
      mac_address: 00-15-5D-AA-33-15
      machine_group: File Servers

  # Initiating processes — the catalogue of binaries Defender for Endpoint
  # surfaces as the *initiator* of an event (`InitiatingProcessFileName` and
  # the related `InitiatingProcess*` columns on every Device* table).
  # Each entry is one process with its real version-info, signing posture,
  # and a list of typical command lines. Hashes (MD5/SHA1/SHA256) are
  # derived deterministically from `file_name` at runtime; do not include
  # them here.
  #
  # `integrity_level`: Untrusted | Low | Medium | High | System
  # `elevation`: Default | Full | Limited
  # `signer_type`: OsVendor | ThirdParty | Unknown
  processes:
    - file_name: explorer.exe
      folder_path: C:\Windows
      company: Microsoft Corporation
      description: Windows Explorer
      internal_file_name: explorer
      original_file_name: EXPLORER.EXE
      product_name: "Microsoft® Windows® Operating System"
      product_version: 10.0.19041.4291
      command_lines:
        - C:\Windows\Explorer.EXE
      integrity_level: Medium
      elevation: Default
      signature_status: Valid
      signer_type: OsVendor
      parent: userinit.exe
    - file_name: powershell.exe
      folder_path: C:\Windows\System32\WindowsPowerShell\v1.0
      company: Microsoft Corporation
      description: Windows PowerShell
      internal_file_name: POWERSHELL
      original_file_name: PowerShell.EXE.MUI
      product_name: "Microsoft® Windows® Operating System"
      product_version: 10.0.19041.3636
      command_lines:
        - powershell.exe -NoProfile -ExecutionPolicy Bypass -File C:\ProgramData\Scripts\northwind-deploy.ps1
        - powershell.exe -Command Get-ADUser -Filter *
      integrity_level: High
      elevation: Full
      signature_status: Valid
      signer_type: OsVendor
      parent: explorer.exe

  # Users / accounts that show up across every table. The first four fields
  # (display_name, upn, object_id, type) are required; everything else is
  # optional and falls back to None / sensible defaults if omitted.
  #
  # `type`: Regular | Admin | Application
  # `sid_rid`: trailing RID appended to on_prem_sid_prefix to build AccountSid
  users:
    - display_name: Avery Chen
      upn: avery.chen@northwind.com
      object_id: 8a9b1c2d-3e4f-4061-8283-94a5b6c7d8e9
      type: Regular
      device_name: WIN-AVERY-01.northwind.com
      device_id: 7c2bd31c-2102-4ce7-93a0-2cf5e19b5a7d
      last_password_change_days_ago: 47
      sam_account_name: avery.chen
      sid_rid: 1104
      given_name: Avery
      surname: Chen
      department: Engineering
      job_title: Senior Software Engineer
      employee_id: E10042
      city: Amsterdam
      country: NL
    - display_name: Sam Rivera
      upn: sam.rivera@northwind.com
      object_id: 2c3d4e5f-6071-4293-a4b5-c6d7e8f90112
      type: Admin
      device_name: WIN-SAM-PAW.northwind.com
      device_id: 9e4df53e-4324-4e09-b5c2-4e17f3bd7c9f
      last_password_change_days_ago: 3
      sam_account_name: sam.rivera
      sid_rid: 500
      given_name: Sam
      surname: Rivera
      department: IT
      job_title: Tier 2 Identity Admin
      employee_id: E10003
      city: Seattle
      country: US
    - display_name: svc-deploy
      upn: svc-deploy@northwind.com
      object_id: 4e5f6071-8293-44b5-86d7-e8f901122334
      type: Application
      sam_account_name: svc-deploy
      sid_rid: 1501
      department: IT
      job_title: Service Account

  # Source IPs paired with consistent geolocation. City / State / Country /
  # ISP / Lat / Long must align per IP because Defender enriches from a
  # single IP-to-geo table — mismatched values give the row away.
  #
  # `category`: Cloud provider | Corporate | ISP
  ips:
    - ip: 20.43.122.12
      city: Amsterdam
      state: North Holland
      country: NL
      isp: Microsoft Corporation
      category: Cloud provider
      latitude: "52.379189"
      longitude: "4.899431"
    - ip: 73.62.18.101
      city: Seattle
      state: Washington
      country: US
      isp: Comcast Cable
      category: Corporate
      latitude: "47.606209"
      longitude: "-122.332069"
    - ip: 82.113.106.9
      city: London
      state: England
      country: GB
      isp: BT Group
      category: ISP
      latitude: "51.507351"
      longitude: "-0.127758"

  # User-agent strings paired with the OS / device / browser they imply.
  # Surfaces in CloudAppEvents.UserAgent / .DeviceType / .OSPlatform and
  # in the EntraIdSignInEvents Browser / OSPlatform columns.
  #
  # `device_type`: Workstation | Mobile
  user_agents:
    - ua: >-
        Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
        (KHTML, like Gecko) Chrome/127.0.0.0 Safari/537.36
      platform: Windows10
      device_type: Workstation
      browser: Chrome 127.0.0
    - ua: >-
        Mozilla/5.0 (iPhone; CPU iPhone OS 17_4 like Mac OS X)
        AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.4 Mobile/15E148
        Safari/604.1
      platform: iOS
      device_type: Mobile
      browser: Safari 17.4

  # Resources users authenticate to in EntraIdSignInEvents.
  # `id` is the resource's first-party app GUID.
  resources:
    - name: Microsoft Graph
      id: 00000003-0000-0000-c000-000000000000
    - name: Office 365 Exchange Online
      id: 00000002-0000-0ff1-ce00-000000000000
    - name: Northwind LOB API
      id: 11112222-3333-4444-5555-666677778888

  # Microsoft Entra ID directory groups. Surfaces as the `{group_id}` path
  # segment in GraphApiAuditEvents.RequestUri (e.g.
  # `/v1.0/groups/<id>/members`). Use this to keep generated Graph traffic
  # pointed at the same set of groups your detections care about.
  groups:
    - name: All Employees
      id: aa11bb22-cc33-4dd4-9eef-1011223344aa
    - name: Northwind Engineering
      id: bb22cc33-dd44-4ee5-9ff0-2122334455bb
    - name: Tier-0 Admins
      id: ee55ff66-0077-4118-9223-5455667788ee

  # Client applications users sign in *through*. Surfaces in
  # EntraIdSignInEvents.Application / .ApplicationId.
  client_apps:
    - name: Microsoft Office
      app_id: d3590ed6-52b3-4102-aeff-aad2292ab01c
    - name: Microsoft Teams
      app_id: 1fec8e78-bce4-4aaf-ab1b-5451cc387264
    - name: Northwind Approver
      app_id: a1b2c3d4-e5f6-7890-1234-56789abcdef0

  # Conditional Access policies that may apply during sign-in. The payload
  # is serialised straight into the JSON `ConditionalAccessPolicies` column
  # on EntraIdSignInEvents — field names mirror Microsoft Graph's
  # camelCase shape (`displayName`, `enforcedGrantControls`,
  # `enforcedSessionControls`).
  conditional_access_policies:
    - id: 8d2d8c45-2f9f-4c5e-8b1a-1c12fbb1d9e6
      displayName: "Require MFA for all users"
      enforcedGrantControls:
        - Mfa
      enforcedSessionControls: []
    - id: 2f0a8d9e-3a8c-4d20-9c7b-1d6f8a4d3a1b
      displayName: "Block legacy authentication"
      enforcedGrantControls:
        - Block
      enforcedSessionControls: []
    - id: 9c4e9b3d-1f6a-4d3e-b8a2-7e1c8a3b9d2f
      displayName: "Require compliant device for admin portals"
      enforcedGrantControls:
        - CompliantDevice
      enforcedSessionControls: []

  # Entra ID `ErrorCode` distribution for *user* sign-ins (interactive and
  # non-interactive). Each entry is a (code, weight, description) triple.
  # `code: 0` is success. Weights are relative — `[(0, 80), (50126, 5)]`
  # makes success outweigh InvalidUserNameOrPassword 16:1. `description`
  # is optional; when set it surfaces verbatim in
  # EntraIdSignInEvents.AuthenticationProcessingDetails on failures, so the
  # row reads like a real Entra processor message rather than a bare number.
  #
  # Use this to simulate scenarios — e.g. a password-spray spike by jacking
  # 50126's weight up, or a Conditional Access rollout by inflating 53003.
  # See https://learn.microsoft.com/azure/active-directory/develop/reference-error-codes
  entra_sign_in_error_codes:
    - code: 0
      weight: 75
    - code: 50126
      weight: 8
      description: "InvalidUserNameOrPassword: Error validating credentials due to invalid username or password."
    - code: 50076
      weight: 5
      description: "UserStrongAuthClientAuthNRequired: Multi-factor authentication is required."
    - code: 53003
      weight: 4
      description: "BlockedByConditionalAccess: Access has been blocked by Conditional Access policies."
    - code: 50053
      weight: 2
      description: "IdsLocked: Account is locked because the user tried to sign in too many times with an incorrect user ID or password."
    - code: 50057
      weight: 1
      description: "UserDisabled: The user account is disabled."

  # Same shape, for *service principal* sign-ins. SPNs fail rarely and the
  # failure modes are token / consent issues rather than credential typos.
  entra_spn_sign_in_error_codes:
    - code: 0
      weight: 92
    - code: 7000215
      weight: 3
      description: "InvalidClientSecret: Invalid client secret is provided."
    - code: 7000222
      weight: 2
      description: "InvalidClientSecretExpiredKeysProvided: The provided client secret keys are expired."
    - code: 90094
      weight: 2
      description: "AdminConsentRequired: Administrator consent is required for this application."
    - code: 700016
      weight: 1
      description: "UnauthorizedClient_DoesNotMatchAuthorizedParty: Application not found in the directory."

    - name: github-actions-deploy
      id: e0f4a715-3a1d-4b1a-cf5e-4d607b8c9d0e
      app_id: 2c3d4e5f-6071-4283-a495-b6c7d8e9f012
      is_managed_identity: false

  # Resources users / SPNs authenticate to (id = first-party app GUID).
  # If omitted, EntraIdSpnSignInEvents uses a workload-identity-flavoured
  # default (Graph, ARM, Key Vault, Storage, SQL DB, Container Registry).
  resources:
    - name: Microsoft Graph
      id: 00000003-0000-0000-c000-000000000000
    - name: Office 365 Exchange Online
      id: 00000002-0000-0ff1-ce00-000000000000
    - name: Northwind LOB API
      id: 11112222-3333-4444-5555-666677778888

  # Azure regions graph.microsoft.com terminates in
  # (GraphApiAuditEvents.Location).
  graph_api_locations:
    - westeurope
    - northeurope

  # Graph endpoints feeding GraphApiAuditEvents. URI may pin version
  # (`/v1.0/...`, `/beta/...`) or use `{ver}` for random selection.
  # Placeholders: {ver} {user_id} {group_id} {sp_id} {app_id} {device_id}
  # {role_id} {drive_id} {team_id} {chat_id}.
  graph_api_endpoints:
    - method: GET
      uri: /v1.0/users
      workload: Microsoft.DirectoryServices
      scope: User.Read.All

  # Entra ID groups. Surfaces as {group_id} in GraphApiAuditEvents.RequestUri.
  groups:
    - name: All Employees
      id: aa11bb22-cc33-4dd4-9eef-1011223344aa
    - name: Northwind Engineering
      id: bb22cc33-dd44-4ee5-9ff0-2122334455bb
    - name: Tier-0 Admins
      id: ee55ff66-0077-4118-9223-5455667788ee

  # Client apps users sign in through (EntraIdSignInEvents.Application).
  client_apps:
    - name: Microsoft Office
      app_id: d3590ed6-52b3-4102-aeff-aad2292ab01c
    - name: Microsoft Teams
      app_id: 1fec8e78-bce4-4aaf-ab1b-5451cc387264
    - name: Northwind Approver
      app_id: a1b2c3d4-e5f6-7890-1234-56789abcdef0

  # CA policies serialised into EntraIdSignInEvents.ConditionalAccessPolicies.
  # Field names follow Graph's camelCase shape.
  conditional_access_policies:
    - id: 8d2d8c45-2f9f-4c5e-8b1a-1c12fbb1d9e6
      displayName: "Require MFA for all users"
      enforcedGrantControls:
        - Mfa
      enforcedSessionControls: []
    - id: 2f0a8d9e-3a8c-4d20-9c7b-1d6f8a4d3a1b
      displayName: "Block legacy authentication"
      enforcedGrantControls:
        - Block
      enforcedSessionControls: []
    - id: 9c4e9b3d-1f6a-4d3e-b8a2-7e1c8a3b9d2f
      displayName: "Require compliant device for admin portals"
      enforcedGrantControls:
        - CompliantDevice
      enforcedSessionControls: []

  # User sign-in ErrorCode distribution. code 0 = success; weights relative.
  # description (optional) surfaces in AuthenticationProcessingDetails.
  # Reshape to simulate scenarios (e.g. password-spray = bump 50126).
  # See https://learn.microsoft.com/azure/active-directory/develop/reference-error-codes
  entra_sign_in_error_codes:
    - code: 0
      weight: 75
    - code: 50126
      weight: 8
      description: "InvalidUserNameOrPassword: Error validating credentials due to invalid username or password."
    - code: 50076
      weight: 5
      description: "UserStrongAuthClientAuthNRequired: Multi-factor authentication is required."
    - code: 53003
      weight: 4
      description: "BlockedByConditionalAccess: Access has been blocked by Conditional Access policies."
    - code: 50053
      weight: 2
      description: "IdsLocked: Account is locked because the user tried to sign in too many times with an incorrect user ID or password."
    - code: 50057
      weight: 1
      description: "UserDisabled: The user account is disabled."

  # Same shape, for service principal sign-ins (token/consent failures).
  entra_spn_sign_in_error_codes:
    - code: 0
      weight: 92
    - code: 7000215
      weight: 3
      description: "InvalidClientSecret: Invalid client secret is provided."
    - code: 7000222
      weight: 2
      description: "InvalidClientSecretExpiredKeysProvided: The provided client secret keys are expired."
    - code: 90094
      weight: 2
      description: "AdminConsentRequired: Administrator consent is required for this application."
    - code: 700016
      weight: 1
      description: "UnauthorizedClient_DoesNotMatchAuthorizedParty: Application not found in the directory."

  # Pre-built emails feeding the Email* / UrlClickEvents generators. All five
  # tables draw from this pool so rows pivot on NetworkMessageId. recipient_persona
  # matches a users[].sam_account_name (with hash-index fallback). Attachment
  # SHA-256s and message-ids are minted at runtime; don't set them.
  email_templates:
    - subject: "Northwind invoice 901 - February"
      sender_display_name: Northwind Billing
      sender_from_address: billing@northwind-supplier.com
      sender_from_domain: northwind-supplier.com
      sender_mail_from_address: billing@bounces.northwind-supplier.com
      sender_mail_from_domain: bounces.northwind-supplier.com
      sender_ipv4: 198.51.100.42
      recipient_persona: avery.chen
      direction: Inbound
      delivery_action: Delivered
      delivery_location: Inbox
      email_action: No action taken
      email_size: 24112
      bulk_complaint_level: 2
      authentication_details: "SPF=pass; DKIM=pass; DMARC=pass; CompAuth=pass"
      confidence_level: '{"Spam":"1"}'
      attachments:
        - file_name: invoice_901.pdf
          extension: pdf
          file_type: PDF Document
          file_size: 18204
      urls:
        - url: https://billing.northwind-supplier.com/pay/901
          domain: billing.northwind-supplier.com
          location: Body

    - subject: "Action required: verify your Northwind account"
      sender_display_name: Northwind IT
      sender_from_address: no-reply@northwind-update.io
      sender_from_domain: northwind-update.io
      sender_mail_from_address: bounce@northwind-update.io
      sender_mail_from_domain: northwind-update.io
      sender_ipv4: 185.244.25.121
      recipient_persona: sam.rivera
      direction: Inbound
      delivery_action: Blocked
      delivery_location: Quarantine
      email_action: Send to quarantine
      email_action_policy: Anti-phishing user impersonation
      email_action_policy_guid: 8d2d8c45-2f9f-4c5e-8b1a-1c12fbb1d9e6
      email_size: 17204
      bulk_complaint_level: 1
      authentication_details: "SPF=fail; DKIM=none; DMARC=fail; CompAuth=fail (reason=000)"
      confidence_level: '{"Phish":"High"}'
      threat_types: Phish
      threat_names: "Phish:HTML/Generic.A"
      threat_classification: Credential phishing
      detection_methods: "URL detonation reputation, Heuristic clustering"
      is_first_contact: true
      urls:
        - url: https://northwind-update.io/verify?u=sam.rivera
          domain: northwind-update.io
          location: Body

  # DeviceEvents ActionType pool. `shape` ∈ {file, network, registry, none}
  # routes the row to the matching auxiliary column block — `file` populates
  # FileName / MD5 / FileOrigin*, `network` populates Local/Remote IP+port,
  # `registry` populates RegistryKey / Value*. `weight` is optional (default 1).
  device_event_actions:
    - action: AntivirusDetectionAndBlock
      shape: file
      weight: 5
    - action: AsrLsassCredentialTheftAudited
      shape: none
      weight: 3
    - action: ExploitGuardNetworkProtectionBlocked
      shape: network
      weight: 2
    - action: TamperingAttempt
      shape: registry
      weight: 1

  # DeviceLogonEvents LogonType distribution. Use MDE's vocabulary
  # (Network, Interactive, RemoteInteractive, Service, Batch, Unlock,
  # NetworkCleartext, CachedInteractive).
  device_logon_types:
    - logon_type: Network
      weight: 60
    - logon_type: Interactive
      weight: 25
    - logon_type: RemoteInteractive
      weight: 10
    - logon_type: Service
      weight: 5

  # Authentication protocols feeding DeviceLogonEvents.Protocol.
  device_logon_protocols:
    - Kerberos
    - Ntlm

  # FailureReason vocabulary — populated only when ActionType == "LogonFailed".
  device_logon_failure_reasons:
    - InvalidUserNameOrPassword
    - AccountLockedOut
    - SmartcardRequired

  # DLL / assembly pool feeding DeviceImageLoadEvents. `folder_path` is the
  # directory the library lives in; the generator concatenates with file_name
  # to render FolderPath. Hashes are derived from file_name.
  loaded_libraries:
    - file_name: kernel32.dll
      folder_path: 'C:\Windows\System32'
    - file_name: amsi.dll
      folder_path: 'C:\Windows\System32'
    - file_name: northwind-agent.dll
      folder_path: 'C:\Program Files\Northwind\bin'

  # Code-signing certs feeding DeviceFileCertificateInfo. `is_root_microsoft`
  # drives the IsRootSignerMicrosoft column; `signature_type` matches MDE
  # values (`Embedded`, `Catalog`, `None`).
  code_signing_certificates:
    - subject: Northwind Corporation
      issuer: Northwind Code Signing CA
      serial: 33000003318FA52A4D8F2E1F2A000000000333
      is_root_microsoft: false
      signature_type: Embedded
    - subject: Microsoft Windows
      issuer: Microsoft Windows Production PCA 2011
      serial: 33000002ED2C45E4C145CF48E7000000000002
      is_root_microsoft: true
      signature_type: Embedded

  # Filenames whose SHA-1 surfaces in DeviceFileCertificateInfo.SHA1. Hashes
  # are derived deterministically from the name so they line up with other
  # Device* tables.
  signed_files:
    - explorer.exe
    - powershell.exe
    - northwind-agent.exe

  # CRL distribution points feeding DeviceFileCertificateInfo.CrlDistributionPointUrls.
  crl_urls:
    - http://crl.northwind.com/codesign.crl
    - http://www.microsoft.com/pkiops/crl/MicCodSigPCA_2011-07-08.crl

  # File templates feeding DeviceFileEvents. `{user}` is rendered to the
  # picked user's sam_account_name. `kind` ∈ {download, doc, temp, share}:
  # `download` populates FileOrigin*, `share` routes through SMB semantics
  # (UNC FolderPath, ShareName, Request* block on NetworkShare* actions).
  file_templates:
    - folder_template: 'C:\Users\{user}\Downloads'
      file_name: northwind-invoice-2026.pdf
      kind: download
    - folder_template: 'C:\Users\{user}\Documents'
      file_name: Q4-forecast.xlsx
      kind: doc
    - folder_template: '\\nw-fs01\Shared\Finance'
      file_name: ledger-2026.xlsx
      kind: share

  # DeviceFileEvents ActionType distribution. NetworkShare* actions are
  # routed exclusively to UNC `share` templates regardless of weighting.
  file_action_types:
    - action: FileCreated
      weight: 50
    - action: FileModified
      weight: 25
    - action: FileRenamed
      weight: 15
    - action: FileDeleted
      weight: 10

  # Pool of (label, sublabel) pairs DeviceFileEvents picks from for randomly
  # labelled local Office docs. HR / Finance share paths still get an
  # auto-applied "Highly Confidential" label regardless of this pool.
  file_sensitivity_labels:
    - label: Northwind General
    - label: Northwind Confidential
      sublabel: All Staff
    - label: Northwind Highly Confidential
      sublabel: Finance

  # Hosts DeviceFileEvents uses to render FileOriginUrl / FileOriginReferrerUrl
  # for browser-downloaded files.
  file_download_hosts:
    - files.northwind.com
    - downloads.northwind-supplier.com

  # Defender for Cloud Apps connectors feeding CloudAppEvents. `actions` is the
  # per-connector ActionType vocabulary (file/mail/account/group/other actions
  # route to different ActivityObjects shapes automatically).
  cloud_apps:
    - name: Microsoft 365
      app_id: 11161
      instance_id: 1001
      audit_source: Office 365
      actions:
        - FileAccessed
        - FileDownloaded
        - SharingSet
    - name: GitHub
      app_id: 15760
      instance_id: 1006
      audit_source: GitHub
      actions:
        - git.clone
        - git.push
        - repo.create

  # Object-name pools CloudAppEvents draws from depending on action shape.
  cloud_app_file_names:
    - Q3_forecast.xlsx
    - design-spec.docx
  cloud_app_mail_subjects:
    - "Re: Q3 numbers"
    - "FW: NDA draft"
  cloud_app_group_names:
    - Engineering
    - Finance

  # DeviceNetworkEvents ActionType distribution — `ConnectionSuccess` typically
  # dominates a healthy fleet.
  device_network_action_types:
    - action: ConnectionSuccess
      weight: 60
    - action: ConnectionFailed
      weight: 8
    - action: DnsConnectionInspected
      weight: 8

  # DeviceNetworkInfo adapter pool — one row per emit picks one. `tunnel`
  # is null for non-VPN adapters.
  network_adapters:
    - name: Wi-Fi
      type: Wireless
      vendor: Intel Corporation
      tunnel: null
      network_category: Private
      network_name: NORTHWIND-CORP
    - name: GlobalProtect VPN
      type: Tunnel
      vendor: Palo Alto Networks
      tunnel: Ssh
      network_category: Domain
      network_name: nw-vpn

  # DeviceNetworkInfo DNS resolvers + default gateways.
  local_dns_servers:
    - 10.10.0.10
    - 10.10.0.11
    - 1.1.1.1
  local_default_gateways:
    - 10.10.20.1
    - 10.10.30.1

  # DeviceRegistryEvents ActionType distribution.
  device_registry_action_types:
    - action: RegistryValueSet
      weight: 60
    - action: RegistryKeyCreated
      weight: 20
    - action: RegistryKeyDeleted
      weight: 10
    - action: RegistryValueDeleted
      weight: 10

  # EmailPostDeliveryEvents action paths. Phish-verdict mail is constrained
  # to ZAP / Admin triggers regardless of weighting.
  email_post_delivery_paths:
    - action: Move to junk
      action_type: Phish ZAP
      trigger: ZAP
      result: Success
      delivery_location: JunkFolder
    - action: Soft delete
      action_type: Manual remediation
      trigger: Admin
      result: Success
      delivery_location: Deleted Items
    - action: Move to inbox
      action_type: User reported not junk
      trigger: User
      result: Success
      delivery_location: Inbox

  # GraphApiAuditEvents HTTP status distribution. `204 No Content` writes
  # zero response bytes regardless of weighting.
  graph_api_status_codes:
    - code: "200"
      weight: 80
    - code: "204"
      weight: 5
    - code: "403"
      weight: 5
    - code: "429"
      weight: 5
    - code: "500"
      weight: 5

  # IdentityAccountInfo authentication method pool.
  identity_auth_methods:
    - Credentials
    - Federated

  # IdentityAccountInfo DefenderRiskLevel distribution (0=None .. 3=High).
  identity_risk_levels:
    - level: 0
      weight: 80
    - level: 1
      weight: 15
    - level: 2
      weight: 4
    - level: 3
      weight: 1

  # IdentityDirectoryEvents ActionType distribution (MDI vocabulary).
  identity_directory_action_types:
    - action: Group Membership changed
      weight: 32
    - action: Account Password changed
      weight: 22
    - action: Service Principal Name added to account
      weight: 5

  # IdentityEvents raw action pool. `target_kind` ∈ {user, group, app, policy}
  # drives the TargetObjects shape.
  identity_raw_actions:
    - action: UserLoggedIn
      application: AzureActiveDirectory
      target_kind: user
      weight: 5
    - action: Add member to group.
      application: AzureActiveDirectory
      target_kind: group
      weight: 2
    - action: group.user_membership.add
      application: Okta
      target_kind: group
      weight: 1

  # IdentityEvents target-object name pools.
  identity_event_group_names:
    - Engineering
    - Finance
    - Domain Admins
  identity_event_app_names:
    - Salesforce
    - GitHub

  # IdentityLogonEvents LogonType / (protocol, port) / failure-reason pools.
  identity_logon_types:
    - logon_type: Network
      weight: 50
    - logon_type: Interactive
      weight: 25
    - logon_type: Service
      weight: 25
  identity_logon_protocols:
    - protocol: Kerberos
      port: 88
      weight: 70
    - protocol: Ntlm
      port: 445
      weight: 30
  identity_logon_failure_reasons:
    - WrongPassword
    - AccountLockedOut
    - SmartcardRequired

  # IdentityQueryEvents — LDAP/SAMR/DNS recon shapes + target pools.
  identity_query_kinds:
    - query_type: QueryUser
      protocol: Ldap
      port: 389
      weight: 35
    - query_type: EnumerateUsers
      protocol: Samr
      port: 445
      weight: 12
    - query_type: Resolve
      protocol: Dns
      port: 53
      weight: 7
  identity_query_group_targets:
    - Domain Admins
    - Enterprise Admins
  identity_query_computer_targets:
    - DC01
    - FS01

  # UrlClickEvents Safe Links outcome pool. Phish-verdict emails are forced
  # to a blocking outcome regardless of weighting.
  url_click_outcomes:
    - action_type: ClickAllowed
      is_clicked_through: true
      weight: 86
    - action_type: Blockpage
      is_clicked_through: false
      threat_types: Phish
      weight: 7
    - action_type: ClickBlocked
      is_clicked_through: false
      threat_types: Malware
      weight: 4
    - action_type: BlockpageOverride
      is_clicked_through: true
      threat_types: Phish
      weight: 3

  # UrlClickEvents source workload distribution.
  url_click_workloads:
    - workload: Email
      weight: 80
    - workload: Teams
      weight: 12
    - workload: Office
      weight: 8

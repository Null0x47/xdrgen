# Local Kustainer (Kusto emulator) for the kustainer sink.
#   docker compose -f docker/docker-compose-kustainer.yml up -d
#   uv run python scripts/create_kustainer_tables.py
#   uv run xdrgen generate --sink kustainer
#
# x86_64 only (Apple Silicon: --platform linux/amd64). ACCEPT_EULA=Y required.
# https://learn.microsoft.com/en-us/azure/data-explorer/kusto-emulator-overview

services:
  kustainer:
    image: mcr.microsoft.com/azuredataexplorer/kustainer-linux:latest
    container_name: xdrgen-kustainer
    ports:
      - "8080:8080"
    environment:
      ACCEPT_EULA: "Y"
    mem_limit: 4g

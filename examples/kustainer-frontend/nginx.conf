# Mirrors the Vite dev proxy: /api/kusto/* → http://kustainer:8080/*.
# Upstream host resolved at request time via Docker's embedded DNS so the
# image still starts when the kustainer container isn't up yet.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    location /api/kusto/ {
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $kustainer_upstream "http://kustainer:8080";
        rewrite ^/api/kusto/(.*)$ /$1 break;
        proxy_pass $kustainer_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
